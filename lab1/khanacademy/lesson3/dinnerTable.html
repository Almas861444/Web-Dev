<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Challenge: The dinner table</title>
    </head>
    <body>
    
        <h1>Our dinner menu</h1>

        <table>
            <thead>
                <tr>
                    <th>Meal</th>
                    <th>Ingredients</th>
                    <th>Price</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>pasta</td>
                    <td>macaroni,oil,cheese</td>
                    <td>15$</td>
                </tr>
                <tr>
                    <td>steak</td>
                    <td>meat,oil,salt</td>
                    <td>30$</td>
                </tr>
                <tr>
                    <td>burger</td>
                    <td>flour,meat,tomato,cheese</td>
                    <td>10$</td>
                </tr>
            </tbody>
        </table>

    </body>
</html>
